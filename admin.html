<!DOCTYPE html>
<html>
<head>
<title>LucidLua Admin</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* NAVBAR */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.title {
  font-size:22px;
  font-weight:bold;
  color:#38bdf8;
}

/* MAIN */
.container {
  padding:40px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  padding:20px;
  margin-bottom:30px;
  box-shadow: 0 0 30px rgba(56,189,248,0.1);
}

/* INPUTS */
input, select {
  padding:10px;
  border-radius:8px;
  border:none;
  margin-right:10px;
  background:#020617;
  color:white;
}

/* BUTTONS */
button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#38bdf8;
  color:black;
  font-weight:bold;
}

button:hover {
  opacity:0.8;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  text-align:left;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.revoke { background:#ef4444; color:white; }
.reset { background:#facc15; color:black; }
</style>
</head>

<body>

<div class="nav">
  <div class="title">LucidLua Admin Panel</div>
</div>

<div class="container">

  <!-- GENERATE -->
  <div class="card">
    <h2>Generate Key</h2><br>
    <input id="pass" placeholder="Admin Password">
    <select id="duration">
      <option value="1">1 Day</option>
      <option value="7">7 Days</option>
      <option value="30">30 Days</option>
      <option value="lifetime">Lifetime</option>
    </select>
    <button onclick="generate()">Generate</button>
    <p id="genResult"></p>
  </div>

  <!-- USERS -->
  <div class="card">
    <h2>Add Balance</h2><br>
    <input id="userBal" placeholder="Username">
    <input id="amount" placeholder="Amount">
    <button onclick="addBalance()">Add</button>
  </div>

  <!-- KEYS TABLE -->
  <div class="card">
    <h2>Keys</h2><br>
    <table>
      <thead>
        <tr>
          <th>Key</th>
          <th>HWID</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="keys"></tbody>
    </table>
  </div>

</div>

<script>
async function load(){
  const pass = document.getElementById("pass").value;

  const res = await fetch("/admin?pass="+pass);
  const data = await res.json();

  const table = document.getElementById("keys");
  table.innerHTML="";

  data.forEach(k=>{
    table.innerHTML += `
      <tr>
        <td>${k.key}</td>
        <td>${k.hwid || "None"}</td>
        <td>${k.revoked ? "Revoked" : "Active"}</td>
        <td>
          <button class="reset" onclick="resetHWID('${k.key}')">Reset</button>
          <button class="revoke" onclick="revoke('${k.key}')">Revoke</button>
        </td>
      </tr>
    `;
  });
}

async function generate(){
  const pass = document.getElementById("pass").value;
  const duration = document.getElementById("duration").value;

  const res = await fetch("/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({password:pass,duration})
  });

  const data = await res.json();
  document.getElementById("genResult").innerText = data.key;

  load();
}

async function revoke(key){
  const pass = document.getElementById("pass").value;

  await fetch("/revoke",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({key,password:pass})
  });

  load();
}

async function resetHWID(key){
  const pass = document.getElementById("pass").value;

  await fetch("/reset-hwid",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({key,password:pass})
  });

  load();
}

async function addBalance(){
  const pass = document.getElementById("pass").value;
  const username = document.getElementById("userBal").value;
  const amount = parseInt(document.getElementById("amount").value);

  await fetch("/add-balance",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({password:pass,username,amount})
  });
}

setInterval(load,3000);
</script>

</body>
</html>
